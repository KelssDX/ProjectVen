services:
  postgres:
    image: postgres:16-alpine
    container_name: vendrome-postgres
    environment:
      POSTGRES_USER: vendrome
      POSTGRES_PASSWORD: vendrome
      POSTGRES_DB: vendrome
    ports:
      - "5433:5432"
    volumes:
      - vendrome_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vendrome -d vendrome"]
      interval: 10s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8.1-alpine
    container_name: vendrome-valkey
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.11-alpine
    container_name: vendrome-nats
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8222/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vendrome_postgres_data:
